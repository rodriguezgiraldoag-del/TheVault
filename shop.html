<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<script>
    function toggleSidebar() {
        document
            .getElementById("brandSidebar")
            .classList.toggle("active");
    }
</script>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">THE VAULT</div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <div class="cart">
            <a href="cart.html">🛒</a>
        </div>
    </nav>

    <!-- Shop Header -->
    <section class="shop-header">
        <h1>SHOP</h1>

        <button class="brand-toggle" onclick="toggleSidebar()">
    ☰ Browse by Brand
</button>
    </section>

    <!-- Shop Layout -->
    <section class="shop-layout">

        <!-- Sidebar -->
        <aside class="brand-sidebar" id="brandSidebar">

            <h3>Brands</h3>

            <ul>
                <li><a href="#">BAPE</a></li>
                <li><a href="#">Denim Tears</a></li>
                <li><a href="#">Hellstar</a></li>
                <li><a href="#">Supreme</a></li>
                <li><a href="#">Sp5der</a></li>
            </ul>

        </aside>

        <!-- Products -->
        <div class="shop-products">

            <h2>BAPE</h2>

            <div class="product-grid">

                <a href="product.html?id=sharkhoodie" class="product-link">
                    <div class="product-card">
                        <img src="images/sharkhoodie.png" alt="Shark Hoodie">
                        <p class="brand-name">BAPE</p>
                        <h3>Shark Full Zip Hoodie</h3>
                        <p>$80</p>
                    </div>
                </a>

                <a href="product.html?id=bapecollege" class="product-link">
                    <div class="product-card">
                        <img src="images/bapecollegetee.png" alt="BAPE College Tee">
                        <p class="brand-name">BAPE</p>
                        <h3>White BAPE College Tee</h3>
                        <p>$40</p>
                    </div>
                </a>

                <a href="product.html?id=bigapehead" class="product-link">
                    <div class="product-card">
                        <img src="images/bigapehead.png" alt="Big Ape Head Tee">
                        <p class="brand-name">BAPE</p>
                        <h3>BAPE Big Ape Head Tee</h3>
                        <p>$40</p>
                    </div>
                </a>

            </div>

        </div>

    </section>

    <!-- Simple Footer -->
    <footer class="footer">
        <div class="footer-section">

            <h4>FOLLOW US</h4>

            <ul>
                <li>
                    <a href="https://instagram.com/The__Vault_____"
                       target="_blank">
                        Instagram
                    </a>
                </li>

                <li>
                    <a href="contact.html">
                        Contact Us
                    </a>
                </li>

            </ul>

        </div>
    </footer>

</body>
</html>
