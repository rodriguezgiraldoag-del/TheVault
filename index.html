<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">THE VAULT</div>

            <ul class="nav-links">
                <li><a href="#">New Arrivals</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Brands</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

            <div class="cart">
                🛒
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1> Designer Clothing & shoes </h1>
<p>Everything you need. All in one place.</p>
            <div class="hero-buttons">
                <button>Shop Now</button>
                <button class="secondary">New Drops</button>
            </div>
        </div>
    </section>

    <!-- Featured Products -->
    <section class="featured">
        <h2>Featured Products</h2>

        <div class="product-grid">

            <div class="product-card">
                <img src="images/bape.jpg" alt="BAPE Hoodie">
                <h3>BAPE Hoodie</h3>
                <p>$350</p>
            </div>

            <div class="product-card">
                <img src="images/sp5der.jpg" alt="Sp5der Hoodie">
                <h3>Sp5der Hoodie</h3>
                <p>$280</p>
            </div>

            <div class="product-card">
                <img src="images/jordan.jpg" alt="Jordan 4 SB">
                <h3>Jordan 4 SB</h3>
                <p>$450</p>
            </div>

            <div class="product-card">
                <img src="images/hellstar.jpg" alt="Hellstar Tee">
                <h3>Hellstar Tee</h3>
                <p>$120</p>
            </div>

        </div>
    </section>
    <section class="brands">
    <h2>FEATURED BRANDS</h2>

    <div class="brand-grid">

        <div class="brand-card">
            <img src="images/bape.png" alt="BAPE">
        </div>

        <div class="brand-card">
            <img src="images/sp5der.webp" alt="SP5DER">
        </div>

        <div class="brand-card">
            <img src="images/hellstar.webp" alt="Hellstar">
        </div>

        <div class="brand-card">
            <img src="images/denimtears.jpeg" alt="Denim Tears">
        </div>

        <div class="brand-card">
            <img src="images/chromehearts.png" alt="Chrome Hearts">
        </div>

        <div class="brand-card">
            <img src="images/supreme.png" alt="Supreme">
        </div>

    </div>
</section>
<div class="footer-section">
    <h4>FOLLOW US</h4>
    <ul>
        <li><a href="https://instagram.com/The__Vault_____" target="_blank">
            Instagram
        </a></li>

        <li><a href="contact.html">Contact Us</a></li>
    </ul>
</div>
</body>
</html>
